name: "License checker"
description: <
  Checks that all rust source files have the MIT license and copyright notice

on: push

jobs:
  license_check:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .
      LICENSE: "MIT"
      COPYRIGHT: "Copyright (c) 2026 Nicolas Gabriel Cotti"
      EXTENSIONS: ".rs"
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call license checker"
        uses: ncotti/cotti-ci/actions/license_checker@main
        with:
          target_dir: "${{ env.REPO_PATH }}"
          license: "${{ env.LICENSE }}"
          copyright: "${{ env.COPYRIGHT }}"
          file_extensions: "${{ env.EXTENSIONS }}"
